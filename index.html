<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Excel Analysis</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      margin-bottom: 18px;
      box-sizing: border-box;
    }
    input[type="file"] {
      margin-top: 6px;
      margin-bottom: 18px;
    }
    button {
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    #status {
      margin-top: 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Upload Excel + Ask Question</h1>

  <form id="uploadForm">
    <label for="message">Question:</label><br>
    <input id="message" type="text" name="message" required>

    <label for="data">Excel file:</label><br>
    <input id="data" type="file" name="data" accept=".xlsx,.csv" required><br>

    <button type="submit">Analyze</button>
  </form>

  <div id="status"></div>

  <script>
    const form = document.getElementById('uploadForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = 'Analyzing...';

      try {
        const formData = new FormData(form);

        const response = await fetch(
          "https://n8n.prouddune-e901e61f.switzerlandnorth.azurecontainerapps.io/webhook/send",
          {
            method: "POST",
            body: formData
          }
        );

        const html = await response.text();

        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        console.error(err);
        status.textContent = 'Request failed. Check browser console.';
      }
    });
  </script>
</body>
</html>
